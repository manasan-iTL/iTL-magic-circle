<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - ページが見つかりません</title>
    <style>
        /* 全体のリセットと基本スタイルの設定  */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* コンテナの装飾 */
        .error-container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            padding: 50px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        /* 巨大な「404」の数字とアニメーション */
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            color: #4f46e5; /* モダンなインディゴブルー */
            margin-bottom: 10px;
            letter-spacing: -0.05em;
            position: relative;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* メッセージ部分 */
        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #111827;
        }

        .error-message {
            font-size: 1rem;
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* 迷子になったユーザーを誘導するボタン */
        .btn-home {
            display: inline-block;
            background-color: #4f46e5;
            color: #ffffff;
            font-weight: 600;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn-home:hover {
            background-color: #4338ca;
        }

        .btn-home:active {
            transform: scale(0.98);
        }

        /* メディアクエリ（スマホ対応） */
        @media (max-width: 480px) {
            .error-code {
                font-size: 6rem;
            }
            .error-title {
                font-size: 1.25rem;
            }
            .error-container {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">404</div>
        
        <h1 class="error-title">ページが見つかりません</h1>
        <p class="error-message">
            お探しのページは、移動または削除されたか、<br>
            URLが間違っている可能性があります。
        </p>
        
        <a href="/" class="btn-home">トップページへ戻る</a>
    </div>

</body>
</html>
